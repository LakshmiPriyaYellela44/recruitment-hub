name: Deploy Fullstack to ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_FRONTEND_REPO: rca-frontend
  ECR_BACKEND_REPO: rca-backend
  ECS_CLUSTER: rca-prod-cluster
  ECS_FRONTEND_SERVICE: frontend-service
  ECS_BACKEND_SERVICE: backend-service

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch Infrastructure Details from SSM
        id: infra
        run: |
          echo "SUBNET_IDS=$(aws ssm get-parameter --name "/rca/infra/SUBNET_IDS" --query "Parameter.Value" --output text)" >> $GITHUB_ENV
          echo "APP_SG_ID=$(aws ssm get-parameter --name "/rca/infra/APP_SG_ID" --query "Parameter.Value" --output text)" >> $GITHUB_ENV
          echo "BE_TG_ARN=$(aws ssm get-parameter --name "/rca/infra/BE_TG_ARN" --query "Parameter.Value" --output text)" >> $GITHUB_ENV
          echo "FE_TG_ARN=$(aws ssm get-parameter --name "/rca/infra/FE_TG_ARN" --query "Parameter.Value" --output text)" >> $GITHUB_ENV

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Backend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:latest
          docker build -t backend ./backend
          docker tag backend:latest $IMAGE
          docker push $IMAGE

      - name: Build & Push Frontend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:latest
          docker build -t frontend ./frontend
          docker tag frontend:latest $IMAGE
          docker push $IMAGE

      - name: Register Backend Task Definition
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:latest
          TASK_DEF=$(cat <<EOF
          {
            "family": "${{ env.ECS_BACKEND_SERVICE }}",
            "networkMode": "awsvpc",
            "containerDefinitions": [
              {
                "name": "${{ env.ECR_BACKEND_REPO }}",
                "image": "$IMAGE",
                "cpu": 256,
                "memory": 512,
                "portMappings": [{ "containerPort": 8000, "hostPort": 8000, "protocol": "tcp" }],
                "essential": true,
                "secrets": [
                  { "name": "RCA_DATABASE_HOST", "valueFrom": "arn:aws:secretsmanager:${{ env.AWS_REGION }}:$ACCOUNT_ID:secret:rca/prod-keys:DB_HOST::" },
                  { "name": "RCA_DATABASE_PASSWORD", "valueFrom": "arn:aws:secretsmanager:${{ env.AWS_REGION }}:$ACCOUNT_ID:secret:rca/prod-keys:DB_PASSWORD::" },
                  { "name": "RCA_DATABASE_NAME", "valueFrom": "arn:aws:secretsmanager:${{ env.AWS_REGION }}:$ACCOUNT_ID:secret:rca/prod-keys:DB_NAME::" }
                ],
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/ecs/${{ env.ECS_BACKEND_SERVICE }}",
                    "awslogs-region": "${{ env.AWS_REGION }}",
                    "awslogs-stream-prefix": "ecs"
                  }
                }
              }
            ],
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "256",
            "memory": "512",
            "executionRoleArn": "arn:aws:iam::$ACCOUNT_ID:role/ecsTaskExecutionRole",
            "taskRoleArn": "arn:aws:iam::$ACCOUNT_ID:role/ecsTaskExecutionRole"
          }
          EOF
          )
          echo "$TASK_DEF" > be-task.json
          aws ecs register-task-definition --cli-input-json file://be-task.json

      - name: Deploy or Create Backend Service
        run: |
          if aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.ECS_BACKEND_SERVICE }} | grep -q "ACTIVE"; then
            aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_BACKEND_SERVICE }} --task-definition ${{ env.ECS_BACKEND_SERVICE }} --force-new-deployment
          else
            aws ecs create-service --cluster ${{ env.ECS_CLUSTER }} --service-name ${{ env.ECS_BACKEND_SERVICE }} --task-definition ${{ env.ECS_BACKEND_SERVICE }} --desired-count 1 --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[${{ env.SUBNET_IDS }}],securityGroups=[${{ env.APP_SG_ID }}],assignPublicIp=ENABLED}" \
              --load-balancers "targetGroupArn=${{ env.BE_TG_ARN }},containerName=${{ env.ECR_BACKEND_REPO }},containerPort=8000"
          fi

      - name: Register Frontend Task Definition
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:latest
          TASK_DEF=$(cat <<EOF
          {
            "family": "${{ env.ECS_FRONTEND_SERVICE }}",
            "networkMode": "awsvpc",
            "containerDefinitions": [
              {
                "name": "${{ env.ECR_FRONTEND_REPO }}",
                "image": "$IMAGE",
                "cpu": 256,
                "memory": 512,
                "portMappings": [{ "containerPort": 80, "hostPort": 80, "protocol": "tcp" }],
                "essential": true,
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/ecs/${{ env.ECS_FRONTEND_SERVICE }}",
                    "awslogs-region": "${{ env.AWS_REGION }}",
                    "awslogs-stream-prefix": "ecs"
                  }
                }
              }
            ],
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "256",
            "memory": "512",
            "executionRoleArn": "arn:aws:iam::$ACCOUNT_ID:role/ecsTaskExecutionRole",
            "taskRoleArn": "arn:aws:iam::$ACCOUNT_ID:role/ecsTaskExecutionRole"
          }
          EOF
          )
          echo "$TASK_DEF" > fe-task.json
          aws ecs register-task-definition --cli-input-json file://fe-task.json

      - name: Deploy or Create Frontend Service
        run: |
          if aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.ECS_FRONTEND_SERVICE }} | grep -q "ACTIVE"; then
            aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_FRONTEND_SERVICE }} --task-definition ${{ env.ECS_FRONTEND_SERVICE }} --force-new-deployment
          else
            aws ecs create-service --cluster ${{ env.ECS_CLUSTER }} --service-name ${{ env.ECS_FRONTEND_SERVICE }} --task-definition ${{ env.ECS_FRONTEND_SERVICE }} --desired-count 1 --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[${{ env.SUBNET_IDS }}],securityGroups=[${{ env.APP_SG_ID }}],assignPublicIp=ENABLED}" \
              --load-balancers "targetGroupArn=${{ env.FE_TG_ARN }},containerName=${{ env.ECR_FRONTEND_REPO }},containerPort=80"
          fi
 
