version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: recruitment_db
    environment:
      POSTGRES_USER: recruitment_user
      POSTGRES_PASSWORD: recruitment_pass
      POSTGRES_DB: recruitment_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruitment_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recruitment_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://recruitment_user:recruitment_pass@db:5432/recruitment_db
      DEBUG: "False"
      AWS_MOCK_ENABLED: "True"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: >
      sh -c "python -c 'from app.core.database import init_db; init_db()' &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recruitment_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
